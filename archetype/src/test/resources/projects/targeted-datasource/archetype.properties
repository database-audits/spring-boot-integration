# Targeted (single named datasource) generation, exercised end to end. The demo harness exposes only Spring Boot's
# auto-configured DataSource/EntityManagerFactory, so the generated DatabaseAuditReportingTestConfiguration qualifies
# those bean names (dataSource / entityManagerFactory) rather than reporting*. Its SqlCapturerRegisteringPostProcessor
# wires reportingSqlCapturer onto that EntityManagerFactory before it is built, so the runtime audits capture SQL and
# run — proving generation, compilation, by-name resolution, and the auto-wired runtime capture against PostgreSQL.
groupId=com.example
artifactId=archetype-it-targeted-datasource
version=1.0.0-SNAPSHOT
package=com.example.demo
schemaName=public
schemaPropertyName=database.datasource.schema-name
postgresImage=postgres:16
databaseAuditsVersion=@project.version@
springBootVersion=4.1.0
generateMode=project
parentClass=none
disabledTests=false
dataSourceName=Reporting
dataSourceBeanName=dataSource
entityManagerFactoryBeanName=entityManagerFactory
