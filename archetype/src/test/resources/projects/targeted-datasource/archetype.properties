# Targeted (single named datasource) generation. The demo harness exposes only Spring Boot's auto-configured
# DataSource/EntityManagerFactory, so the generated DatabaseAuditAuroraTestConfiguration qualifies those bean
# names (dataSource / entityManagerFactory) rather than aurora* — proving generation, compilation, and that the
# generated config resolves its qualified beans and builds the whole suite. Tests stay @Disabled: the runtime
# audits' capturer is not the demo EntityManagerFactory's StatementInspector here, so they cannot run.
groupId=com.example
artifactId=archetype-it-targeted-datasource
version=1.0.0-SNAPSHOT
package=com.example.demo
schemaName=public
schemaPropertyName=database.datasource.schema-name
postgresImage=postgres:16
databaseAuditsVersion=@project.version@
springBootVersion=4.1.0
generateMode=project
parentClass=none
disabledTests=true
dataSourceName=Aurora
dataSourceBeanName=dataSource
entityManagerFactoryBeanName=entityManagerFactory
