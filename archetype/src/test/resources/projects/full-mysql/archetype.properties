# Non-PostgreSQL end-to-end self-test: generates the full demo harness targeting MySQL and runs it against a
# Testcontainers MySQL. It proves the database-selection seam — the MySQLContainer demo config, the MySQL JDBC
# driver + Testcontainers module in the generated pom, and the deletion of the PostgreSQL-only plan ITs — while the
# catalog, JPA, and unconditional-mutation audits run against MySQL. schemaName is left at its default (public),
# exercising the platform-aware remap to the MySQL container's database (test); databaseImage pins the image
# (exercising the explicit-image override the PostgreSQL projects leave as none).
groupId=com.example
artifactId=archetype-it-demo-mysql
version=1.0.0-SNAPSHOT
package=com.example.demo
schemaName=public
schemaPropertyName=database.datasource.schema-name
databasePlatform=mysql
databaseImage=mysql:8
databaseAuditsVersion=@project.version@
springBootVersion=4.1.0
reportFormat=asciidoc
fixFormat=liquibase-xml
fixPlacement=both
generateMode=project
parentClass=none
disabledTests=false
dataSourceName=none
dataSourceBeanName=none
entityManagerFactoryBeanName=none
