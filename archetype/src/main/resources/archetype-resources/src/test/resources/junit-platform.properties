# Order test classes by @Order so the SQL-priming workload (RepositoryWorkloadIT, @Order(Integer.MIN_VALUE)) runs
# before the runtime audit ITs that read the captured SQL. Only the priming test's low order is load-bearing; the
# audit ITs run after it regardless of whether their @Order is JUnit's or Spring's.
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer#[[$]]#OrderAnnotation

# The database-audits report listener (auto-registered from the integration jar) writes a consolidated report of
# every finding to target/database-audit-report.<ext> when a run has findings, and stays inert when clean. Set the
# format (markdown, asciidoc, text), the per-finding fix output (none, sql, liquibase-xml), and where fixes appear
# (both, inline, section); see the usage docs.
database-audits.report.format=${reportFormat}
database-audits.report.fix-format=${fixFormat}
database-audits.report.fix-placement=${fixPlacement}
