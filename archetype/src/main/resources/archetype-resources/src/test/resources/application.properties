# Demo harness configuration that lets the audit ITs run standalone.
# The DataSource (JDBC URL, username, password) is supplied by DemoDatabaseTestConfig via a DynamicPropertyRegistrar.
# Liquibase owns the schema; Hibernate does not (ddl-auto=none) — the JPA example audit validates entity/schema
# agreement itself rather than relying on Hibernate's fail-fast startup validation.
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
#if($databasePlatform != 'postgresql')
# MySQL and MariaDB store an unquoted DATABASECHANGELOG uppercase, which the primary-key audit's built-in lowercase
# exclusion (databasechangelog / databasechangeloglock) would miss; name the bookkeeping tables lowercase so it applies.
spring.liquibase.database-change-log-table=databasechangelog
spring.liquibase.database-change-log-lock-table=databasechangeloglock
#end

# The schema the catalog audits scan; read by the example ITs via @Value("#[[${]]#${schemaPropertyName}#[[}]]#").
#if($databasePlatform != 'postgresql' && $schemaName == 'public')
# MySQL and MariaDB have no "public" schema; their Testcontainers database is "test". When schemaName is left at its
# PostgreSQL-oriented default, scan that container database instead so the demo audits find the generated tables.
${schemaPropertyName}=test
#else
${schemaPropertyName}=${schemaName}
#end
