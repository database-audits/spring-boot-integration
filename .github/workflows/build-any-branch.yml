# Compile and test every branch: unit tests (surefire, *Test) and integration
# tests (failsafe, *IT).
name: Build any branch

on:
  push:
    paths-ignore:
      - "**/src/site/**"
      - "**/*.adoc"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/src/site/**"
      - "**/*.adoc"
      - "**/*.md"

env:
  MAVEN_COMMAND: ./mvnw
  MAVEN_CLI_COMMON: "-e -B"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-and-unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/jdk-setup
      - name: Compile and run unit and integration tests
        # install (not verify) so the archetype's generate-and-run IT resolves the freshly built integration artifact from the local repo.
        run: ${{ env.MAVEN_COMMAND }} ${{ env.MAVEN_CLI_COMMON }} clean install

  submit-dependencies:
    needs: compile-and-unit-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/jdk-setup
      - name: Submit dependencies to GitHub
        uses: advanced-security/maven-dependency-submission-action@v5
